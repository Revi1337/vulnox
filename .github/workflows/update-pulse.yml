name: Update Vulnerability Data

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */2 * * *' # Every 2 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Fetch Latest Pulse & Analytics
        run: |
          node scripts/fetch-pulse.mjs
          node scripts/analyze-trends.mjs

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pulse.json data/analytics.json data/trends.json
          git commit -m "chore: update live pulse and analytics data [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push
